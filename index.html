<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Through Science Guruji - Login</title>
    <!-- सुंदर डिज़ाइन के लिए Tailwind CSS -->
    <script src="https://tailwindcss.com"></script>
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6">

    <!-- मुख्य लॉगिन कार्ड (यह मोबाइल और पीसी दोनों पर परफेक्ट दिखेगा) -->
    <div id="login-card" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center border border-gray-100 transform transition-all hover:scale-105">
        
        <div class="mb-8">
            <div class="w-16 h-16 bg-blue-600 text-white rounded-full flex items-center justify-center text-2xl font-bold mx-auto mb-4 shadow-md">
                🔬
            </div>
            <h1 class="text-2xl font-extrabold text-gray-800 tracking-tight">
                Help Through Science Guruji
            </h1>
            <p class="text-sm text-gray-500 mt-2">
                विज्ञान की दुनिया में आपका स्वागत है। पढ़ना शुरू करने के लिए लॉगिन करें।
            </p>
        </div>

        <!-- गूगल लॉगिन बटन -->
        <button id="google-login-btn" class="w-full flex items-center justify-center gap-3 bg-white text-gray-700 font-semibold py-3 px-4 border border-gray-300 rounded-xl shadow-sm hover:bg-gray-50 hover:border-gray-400 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all active:scale-95">
            <!-- गूगल का जी-आइकॉन -->
            <svg class="w-5 h-5" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" />
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            <span id="btn-text">Google के साथ लॉगिन करें</span>
        </button>

        <p class="text-xs text-gray-400 mt-8">सुरक्षित लॉगिन • आपके डेटा की पूरी प्राइवेसी</p>
    </div>

    <!-- सफलता का मैसेज जो लॉगिन के बाद दिखेगा -->
    <div id="welcome-card" class="hidden bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center border border-gray-100">
        <h1 class="text-3xl font-bold text-blue-600 mb-2">Help Through Science Guruji</h1>
        <p id="welcome-text" class="text-xl text-gray-700 font-medium"></p>
        <p class="text-gray-500 mt-2">आप सफलतापूर्वक लॉगिन हो चुके हैं। जल्द ही यहाँ आपके नोट्स दिखाई देंगे।</p>
    </div>

    <!-- Firebase और Supabase की लाइब्रेरीज़ लोड करना -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://gstatic.com";
        import { createClient } from "https://jsdelivr.net";

        // 1. आपकी फोटो से लिया गया Firebase कॉन्फ़िगरेशन
        const firebaseConfig = {
            apiKey: "AIzaSyCyac4YWyEu6ynewYyJnIF3ftfjOYAU_w4",
            authDomain: "://firebaseapp.com",
            projectId: "panwar-b2450",
            messagingSenderId: "588819582908",
            appId: "1:588819582908:web:24d0cfaab6ec207607e5b9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // 2. आपका Supabase कॉन्फ़िगरेशन
        const supabaseUrl = "https://supabase.co";
        const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjZmtma3pkZmtqbHdwbGhkaXZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3OTEyMzQsImV4cCI6MjA5ODM2NzIzNH0.f86nMEB8MUGtXE8wAdBfeuCjxiul2IgPpBG9vVvdESM";
        const supabase = createClient(supabaseUrl, supabaseAnonKey);

        // बटन क्लिक होने पर क्या होगा
        const loginBtn = document.getElementById('google-login-btn');
        const btnText = document.getElementById('btn-text');

        loginBtn.addEventListener('click', async () => {
            btnText.innerText = "कनेक्ट हो रहा है...";
            loginBtn.disabled = true;

            try {
                // 1. Firebase Google पॉपअप खोलें
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                // 2. छात्र का डेटा Supabase की 'users' टेबल में सेव करें
                const { error } = await supabase.from('users').upsert({
                    email: user.email,
                    name: user.displayName,
                    role: 'student'
                }, { onConflict: 'email' });

                if (error) throw error;

                // 3. लॉगिन होने के बाद स्क्रीन बदलें
                document.getElementById('login-card').classList.add('hidden');
                document.getElementById('welcome-card').classList.remove('hidden');
                document.getElementById('welcome-text').innerText = `नमस्ते, ${user.displayName}!`;
                
            } catch (error) {
                console.error(error);
                alert("लॉगिन में समस्या आई: " + error.message);
                btnText.innerText = "Google के साथ लॉगिन करें";
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
